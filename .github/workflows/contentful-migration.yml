name: Contentful Migration

on:
  push:
    branches: [ master, staging ]
    paths:
      - 'migrations/**'
  pull_request:
    branches: [ master, staging ]
    paths:
      - 'migrations/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (master/staging)'
        required: true
        default: 'staging'
        type: choice
        options:
          - master
          - staging

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Contentful Migration
        uses: ./.github/workflows/contentful-migration
        with:
          contentful-space-id: ${{ secrets.CONTENTFUL_SPACE_ID }}
          contentful-management-token: ${{ secrets.CONTENTFUL_MANAGEMENT_TOKEN }}
          environment: ${{ github.event.inputs.environment || github.ref_name }} 