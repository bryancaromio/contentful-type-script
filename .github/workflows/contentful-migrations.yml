name: Contentful Migrations

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'migrations/**'
      - '.github/workflows/contentful-migrations.yml'
      - '.github/workflows/contentful-migration/action.yml'
  
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview changes without applying them'
        type: boolean
        default: true
        required: false
      skip_validation:
        description: 'Skip environment validation (use with caution)'
        type: boolean
        default: false
        required: false

# Permisos necesarios para comentar en PRs y crear tags
permissions:
  contents: write
  pull-requests: write
  issues: write

# Previene ejecuciones paralelas del mismo workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.19.0'

jobs:
  # Job para validar y previsualizar cambios en PRs
  validate-pr:
    if: |
      github.event_name == 'pull_request' && 
      github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    outputs:
      migration_status: ${{ steps.migration.outputs.status }}
      changes_detected: ${{ steps.migration.outputs.changes-detected }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  
      
      - name: Run Contentful Migration
        id: migration
        uses: ./.github/workflows/contentful-migration
        with:
          space-id: ${{ secrets.CONTENTFUL_SPACE_ID }}
          management-token: ${{ secrets.CONTENTFUL_MANAGEMENT_TOKEN }}
          source-environment: ${{ github.head_ref }}
          node-version: ${{ env.NODE_VERSION }}
          dry-run: true
          fail-on-error: true
          skip-if-no-changes: false
          comment-on-pr: true
          skip-validation: true

  # Job para promociones manuales entre environments
  promote-environment:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.ref_name }}
      url: ${{ steps.migration.outputs.environment_url }}
    outputs:
      migration_status: ${{ steps.migration.outputs.status }}
      changes_detected: ${{ steps.migration.outputs.changes-detected }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper tagging
        
      - name: Run Contentful Migration
        id: migration
        uses: ./.github/workflows/contentful-migration
        with:
          space-id: ${{ secrets.CONTENTFUL_SPACE_ID }}
          management-token: ${{ secrets.CONTENTFUL_MANAGEMENT_TOKEN }}
          source-environment: ${{ github.ref_name }}
          node-version: ${{ env.NODE_VERSION }}
          dry-run: ${{ github.event.inputs.dry_run }}
          fail-on-error: true
          skip-if-no-changes: true
          comment-on-pr: false
          skip-validation: ${{ github.event.inputs.skip_validation }}
      
      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Contentful Migration Error: ${process.env.SOURCE_ENV} → ${process.env.TARGET_ENV}`,
              body: `
              # Contentful Migration Error
              
              ## Details
              - **Source Environment:** ${process.env.SOURCE_ENV}
              - **Target Environment:** ${process.env.TARGET_ENV}
              - **Run:** [View details](${process.env.RUN_URL})
              
              ## Error
              \`\`\`
              ${process.env.ERROR_MESSAGE}
              \`\`\`
              
              Please check the workflow logs for more details.
              `
            });
            
            console.log(`Issue created: ${issue.data.html_url}`);
        env:
          SOURCE_ENV: ${{ github.ref_name }}
          TARGET_ENV: ${{ steps.migration.outputs.target_env }}
          ERROR_MESSAGE: ${{ steps.migration.outputs.error }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # Job para promociones automáticas después de merge a develop, qa, staging y main
  auto-promote:
    if: |
      github.event_name == 'pull_request' && 
      github.event.pull_request.merged == true && 
      (github.base_ref == 'develop' || github.base_ref == 'qa' || github.base_ref == 'staging' || github.base_ref == 'main')
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.base_ref }}
      url: ${{ steps.migration.outputs.environment_url }}
    
    steps:
      - name: Set source environment
        id: set-source
        run: |
          if [ "${{ github.base_ref }}" = "qa" ]; then
            echo "source_env=develop" >> $GITHUB_OUTPUT
          elif [ "${{ github.base_ref }}" = "staging" ]; then
            echo "source_env=qa" >> $GITHUB_OUTPUT
          elif [ "${{ github.base_ref }}" = "main" ]; then
            echo "source_env=staging" >> $GITHUB_OUTPUT
          else
            echo "source_env=${{ github.base_ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper tagging

      - name: Run Contentful Migration
        id: migration
        uses: ./.github/workflows/contentful-migration
        with:
          space-id: ${{ secrets.CONTENTFUL_SPACE_ID }}
          management-token: ${{ secrets.CONTENTFUL_MANAGEMENT_TOKEN }}
          source-environment: ${{ steps.set-source.outputs.source_env }}
          node-version: ${{ env.NODE_VERSION }}
          dry-run: false
          fail-on-error: true
          skip-if-no-changes: true
          comment-on-pr: false
          skip-validation: true