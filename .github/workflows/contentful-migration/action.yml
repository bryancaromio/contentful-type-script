name: 'Contentful Migration Action'
description: 'Manages Contentful content model migrations between environments'
author: 'Wynn'

inputs:
  space-id:
    description: 'Contentful Space ID'
    required: true
  management-token:
    description: 'Contentful Management Token'
    required: true
  source-environment:
    description: 'Source branch/environment (develop, qa, staging, main)'
    required: true
  node-version:
    description: 'Node.js version to use'
    default: '20.19.0'
  dry-run:
    description: 'Whether to perform a dry run (no changes applied)'
    default: 'true'
  github-token:
    description: 'GitHub token for PR comments'
    required: false
    default: ${{ github.token }}
  fail-on-error:
    description: 'Whether to fail the workflow if migration validation fails'
    required: false
    default: 'true'
  skip-if-no-changes:
    description: 'Skip migration if no changes detected'
    required: false
    default: 'true'
  comment-on-pr:
    description: 'Whether to comment migration details on PR'
    required: false
    default: 'true'

outputs:
  migration-status:
    description: 'Status of the migration (success/failure)'
    value: ${{ steps.migration.outputs.status }}
  changes-detected:
    description: 'Whether changes were detected between environments'
    value: ${{ steps.preview.outputs.changes-detected }}
  migration-summary:
    description: 'Summary of the migration changes'
    value: ${{ steps.preview.outputs.summary }}
  error-message:
    description: 'Detailed error message if migration failed'
    value: ${{ steps.migration.outputs.error }}
  validation-results:
    description: 'Results of environment validation'
    value: ${{ steps.validate.outputs.results }}

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for proper tagging
    
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 8.14.0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
    
    - name: Install dependencies
      shell: bash
      run: |
        echo "📦 Installing dependencies..."
        pnpm install --frozen-lockfile --prefer-offline
        echo "🔧 Installing contentful-cli globally..."
        pnpm add -g contentful-cli
      env:
        HUSKY: 0  # Disable Husky hooks during CI

    - name: Build TypeScript
      shell: bash
      run: |
        echo "🔨 Building TypeScript files..."
        pnpm run build

    - name: Setup directories
      shell: bash
      run: |
        echo "📁 Setting up directories..."
        mkdir -p migrations
        chmod 755 migrations
        touch migrations/.gitkeep

    - name: Get target environment
      shell: bash
      id: get-target
      run: |
        echo "🎯 Determining target environment..."
        # Define the promotion path
        case "${{ inputs.source-environment }}" in
          "develop")
            echo "target_env=qa" >> $GITHUB_OUTPUT
            echo "✅ Target environment: qa"
            ;;
          "qa")
            echo "target_env=staging" >> $GITHUB_OUTPUT
            echo "✅ Target environment: staging"
            ;;
          "staging")
            echo "target_env=main" >> $GITHUB_OUTPUT
            echo "✅ Target environment: main"
            ;;
          "main")
            echo "❌ Error: Cannot promote from main environment"
            if [[ "${{ inputs.fail-on-error }}" == "true" ]]; then
              exit 1
            fi
            ;;
          *)
            echo "❌ Error: Invalid source environment: ${{ inputs.source-environment }}"
            echo "Valid environments are: develop, qa, staging"
            if [[ "${{ inputs.fail-on-error }}" == "true" ]]; then
              exit 1
            fi
            ;;
        esac

    - name: Validate environments
      shell: bash
      id: validate
      env:
        CONTENTFUL_SPACE_ID: ${{ inputs.space-id }}
        CONTENTFUL_MANAGEMENT_TOKEN: ${{ inputs.management-token }}
      run: |
        echo "🔍 Validating environments..."
        echo "   Source: ${{ inputs.source-environment }}"
        echo "   Target: ${{ steps.get-target.outputs.target_env }}"
        
        # Skip Contentful access validation for now to avoid CLI issues
        # We'll validate the basic structure and environment variables
        VALIDATION_OUTPUT=$(node dist/validate-migration.js "${{ inputs.source-environment }}" "${{ steps.get-target.outputs.target_env }}" --skip-contentful-check 2>&1)
        VALIDATION_EXIT_CODE=$?
        
        echo "results<<EOF" >> $GITHUB_OUTPUT
        echo "$VALIDATION_OUTPUT" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        
        if [ $VALIDATION_EXIT_CODE -ne 0 ] && [ "${{ inputs.fail-on-error }}" == "true" ]; then
          echo "❌ Environment validation failed"
          exit 1
        fi

    - name: Generate migration preview
      shell: bash
      id: preview
      if: success()
      env:
        CONTENTFUL_SPACE_ID: ${{ inputs.space-id }}
        CONTENTFUL_MANAGEMENT_TOKEN: ${{ inputs.management-token }}
      run: |
        echo "🔍 Generating preview for environments:"
        echo "   ${{ inputs.source-environment }} → ${{ steps.get-target.outputs.target_env }}"
        
        # Create temporary file for output
        TEMP_OUTPUT_FILE=$(mktemp)
        
        # Run preview based on source environment and capture output while showing it
        case "${{ inputs.source-environment }}" in
          "develop")
            pnpm run check:dev 2>&1 | tee "$TEMP_OUTPUT_FILE"
            ;;
          "qa")
            pnpm run check:qa 2>&1 | tee "$TEMP_OUTPUT_FILE"
            ;;
          "staging")
            pnpm run check:staging 2>&1 | tee "$TEMP_OUTPUT_FILE"
            ;;
          *)
            echo "❌ Error: Invalid source environment: ${{ inputs.source-environment }}"
            echo "Valid environments are: develop, qa, staging"
            exit 1
            ;;
        esac
        
        PREVIEW_EXIT_CODE=${PIPESTATUS[0]}
        PREVIEW_OUTPUT=$(cat "$TEMP_OUTPUT_FILE")
        rm -f "$TEMP_OUTPUT_FILE"
        
        # Check if changes were detected
        if echo "$PREVIEW_OUTPUT" | grep -q "No changes detected"; then
          echo "changes-detected=false" >> $GITHUB_OUTPUT
          echo "summary=No changes detected between environments" >> $GITHUB_OUTPUT
          
          if [[ "${{ inputs.skip-if-no-changes }}" == "true" ]]; then
            echo "⏭️ Skipping migration as no changes were detected"
            exit 0
          fi
        else
          echo "changes-detected=true" >> $GITHUB_OUTPUT
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$PREVIEW_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi
        
        if [ $PREVIEW_EXIT_CODE -ne 0 ] && [ "${{ inputs.fail-on-error }}" == "true" ]]; then
          echo "❌ Preview generation failed"
          exit 1
        fi

    - name: Comment PR
      if: |
        github.event_name == 'pull_request' && 
        inputs.github-token != '' && 
        inputs.comment-on-pr == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          
          try {
            const migrationFiles = fs.readdirSync('./migrations')
              .filter(file => file.endsWith('.js'))
              .sort((a, b) => b.localeCompare(a));
            
            if (migrationFiles.length > 0) {
              const latestMigration = migrationFiles[0];
              const migrationContent = fs.readFileSync(`./migrations/${latestMigration}`, 'utf8');
              
              const validationResults = `${{ steps.validate.outputs.results }}`;
              
              const comment = `## Contentful Migration Preview 🔍
              
              ### Environment Promotion
              \`${{ inputs.source-environment }}\` → \`${{ steps.get-target.outputs.target_env }}\`
              
              ### Latest Migration File
              \`${latestMigration}\`
              
              \`\`\`javascript
              ${migrationContent}
              \`\`\`
              
              ### Validation Results
              \`\`\`
              ${validationResults}
              \`\`\`
              
              ### Changes Detected
              ${${{ steps.preview.outputs.changes-detected }} ? '✅ Yes' : '❌ No'}
              
              <details>
              <summary>Full Preview Output</summary>
              
              \`\`\`
              ${{ steps.preview.outputs.summary }}
              \`\`\`
              </details>
              
              > **Note**: ${${{ inputs.dry-run }} ? 'This is a dry run. No changes will be applied.' : 'Changes will be applied when merged.'}
              `;
              
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
          } catch (error) {
            console.error('Error creating PR comment:', error);
            // Don't fail the workflow for comment errors
          }

    - name: Apply migration
      shell: bash
      id: migration
      if: inputs.dry-run != 'true' && success()
      env:
        CONTENTFUL_SPACE_ID: ${{ inputs.space-id }}
        CONTENTFUL_MANAGEMENT_TOKEN: ${{ inputs.management-token }}
      run: |
        echo "🔄 Applying migration:"
        echo "   ${{ inputs.source-environment }} → ${{ steps.get-target.outputs.target_env }}"
        
        MIGRATION_OUTPUT=$(pnpm run sync -- "${{ inputs.source-environment }}" 2>&1)
        MIGRATION_EXIT_CODE=$?
        
        if [ $MIGRATION_EXIT_CODE -eq 0 ]; then
          echo "status=success" >> $GITHUB_OUTPUT
          echo "error=" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "error<<EOF" >> $GITHUB_OUTPUT
          echo "$MIGRATION_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          if [[ "${{ inputs.fail-on-error }}" == "true" ]]; then
            exit 1
          fi
        fi

    - name: Create deployment tag
      if: |
        inputs.dry-run != 'true' && 
        steps.migration.outputs.status == 'success' && 
        steps.preview.outputs.changes-detected == 'true'
      shell: bash
      run: |
        echo "🏷️ Creating deployment tag..."
        TIMESTAMP=$(date +%Y%m%d_%H%M%S)
        TAG_NAME="contentful_${{ inputs.source-environment }}_to_${{ steps.get-target.outputs.target_env }}_${TIMESTAMP}"
        
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Add migration details to tag message
        TAG_MESSAGE="Contentful migration from ${{ inputs.source-environment }} to ${{ steps.get-target.outputs.target_env }}

        Changes applied:
        ${{ steps.preview.outputs.summary }}"
        
        git tag -a "$TAG_NAME" -m "$TAG_MESSAGE"
        git push origin "$TAG_NAME"
        echo "✅ Deployment tag created: $TAG_NAME" 